import streamlit as st
import pandas as pd
import time

# --- CẤU HÌNH WORKFLOW ---
def workflow_process(input_data):
    """Mô phỏng các bước xử lý dữ liệu"""
    with st.status("Đang thực hiện Workflow...", expanded=True) as status:
        st.write("🔍 Đang kiểm tra dữ liệu đầu vào...")
        time.sleep(1)
        
        st.write("⚙️ Đang xử lý logic backend (Python)...")
        # Giả sử xử lý chuyển chữ hoa
        processed_data = input_data.upper() 
        time.sleep(1)
        
        st.write("💾 Đang chuẩn bị xuất dữ liệu...")
        time.sleep(0.5)
        
        status.update(label="Workflow hoàn tất!", state="complete", expanded=False)
    return processed_data

# --- GIAO DIỆN NGƯỜI DÙNG ---
st.set_page_config(page_title="My Workflow Tool", page_icon="🚀")
st.title("🚀 Hệ thống Quản lý Workflow")

tab1, tab2 = st.tabs(["Nhập liệu", "Lịch sử"])

with tab1:
    user_input = st.text_input("Nhập nội dung cần xử lý:", placeholder="Ví dụ: Project quản lý phim...")
    
    if st.button("Chạy Workflow"):
        if user_input:
            result = workflow_process(user_input)
            st.success(f"Kết quả sau xử lý: **{result}**")
            
            # Lưu vào session state (giả lập database tạm thời)
            if 'history' not in st.session_state:
                st.session_state.history = []
            st.session_state.history.append(result)
        else:
            st.warning("Vui lòng nhập gì đó trước khi chạy!")

with tab2:
    st.subheader("Các tác vụ đã hoàn thành")
    if 'history' in st.session_state:
        for i, item in enumerate(st.session_state.history):
            st.write(f"{i+1}. {item}")
    else:
        st.info("Chưa có lịch sử xử lý.")
